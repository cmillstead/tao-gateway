services:
  gateway:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-tao}:${POSTGRES_PASSWORD:-tao}@postgres:5432/${POSTGRES_DB:-tao_gateway}
      - REDIS_URL=redis://redis:6379/0
      - DEBUG=${DEBUG:-true}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-dev-only-insecure-key-do-not-use-in-prod}
      - ENABLE_BITTENSOR=${ENABLE_BITTENSOR:-false}
      - WALLET_PATH=/app/.bittensor/wallets
    volumes:
      - ${WALLET_PATH:-./.bittensor/wallets}:/app/.bittensor/wallets:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tao}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tao}
      POSTGRES_DB: ${POSTGRES_DB:-tao_gateway}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tao}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
